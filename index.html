<script>

let sentenceChartInstance = null;
let wordChartInstance = null;

// ===================== YARDIMCI FONKSİYONLAR =====================
function getSentences(text) {
  return text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 3);
}

function getWords(text) {
  return text.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(w => w.length > 0);
}

function getWordsFiltered(text, lang) {
  const stops = lang === 'tr' ? STOPWORDS_TR : STOPWORDS_EN;
  return getWords(text).filter(w => !stops.has(w) && w.length > 2);
}

function detectLang(text) {
  const words = getWords(text);
  let trCount = 0, enCount = 0;
  words.forEach(w => {
    if (/[çğıöşü]/.test(w)) trCount++;
    else if (STOPWORDS_EN.has(w)) enCount++;
  });
  return trCount >= enCount ? 'tr' : 'en';
}

function jaccard(a, b) {
  if (a.size === 0 && b.size === 0) return 0;
  const inter = new Set([...a].filter(x => b.has(x)));
  const union = new Set([...a, ...b]);
  return inter.size / union.size;
}

function stdDev(arr) {
  if (arr.length < 2) return 0;
  const mean = arr.reduce((s,v) => s+v, 0) / arr.length;
  return Math.sqrt(arr.reduce((s,v) => s + (v-mean)**2, 0) / arr.length);
}

function mean(arr) {
  return arr.length === 0 ? 0 : arr.reduce((s,v) => s+v, 0) / arr.length;
}

function scoreColor(score) {
  if (score > 60) return 'var(--red)';
  if (score >= 30) return 'var(--yellow)';
  return 'var(--green)';
}

function scoreClass(score) {
  if (score > 60) return 'score-low';
  if (score >= 30) return 'score-mid';
  return 'score-high';
}

// ===================== EŞ ANLAMLI HARİTASI (Semantik Benzerlik) =====================
const SYNONYM_GROUPS = [
  ["gelişmek","ilerlemek","büyümek","artmak","yükselmek","genişlemek","gelişim","ilerleme","büyüme","artış","yükseliş","genişleme","geliyor","ilerliyor","artıyor","yükseliyor","gelişti","ilerledi","arttı","yükseldi","gelişme","ilerleme"],

  ["hayat","yaşam","günlük","yaşam","hayatı","yaşamı","hayatın","yaşamın","hayatımız","yaşamımız","hayatımızın","yaşamımıza"],
  ["gelecek","ileride","ilerleyen","gelecekte","ileriki","geleceğin","ilerideki","gelecekteki"],
  ["alan","sektör","bölüm","dal","saha","sektöründe","alanında","bölümünde","alanlarda"],
  ["gerekli","şart","lazım","önemli","zorunlu","gerekmektedir","gerekir","şarttır","gereklidir"],
  ["katkı","fayda","yarar","katkıda","fayda sağlar","yarar sağlar","katkı sağlar","faydalı","yararlı","katkıda bulunmak"],
  ["sorun","problem","zorluk","sıkıntı","mesele","sorunu","problemi","zorluğu","sorunlar","problemler","sorunları"],
  ["çözüm","çare","yol","çözümü","çözümüne","çözüm üretmek","çözüm bulmak","çözümler"],
  ["artırmak","güçlendirmek","geliştirmek","artırılmalı","güçlendirilmeli","geliştirilmeli","artırılması","güçlendirilmesi","geliştirilmesi","artırmak","artırılmalıdır"],
  ["kullanmak","yararlanmak","faydalanmak","kullanımı","kullanım","kullanılarak","yararlanılarak","kullanılmaktadır","kullanılmaya"],
  ["sağlamak","temin etmek","sunmak","sağlar","sağlayan","sağladığı","sağlamaktadır","sağlamıştır","sunmaktadır","sunar","sağlaması"],

const WORD_TO_GROUP = {};
SYNONYM_GROUPS.forEach((group, idx) => {
  group.forEach(word => { WORD_TO_GROUP[word.toLowerCase()] = idx; });
});

function stemTr(word) {
  const suffixes = [
    "maktadır","mektedir","maktadir","mektedir",
    "larımız","lerimiz","larınız","leriniz",
    "larından","lerinden","larından","lerinden",
    "ları","leri","ları","leri",
    "ımız","imiz","umuz","ümüz",
    "ınız","iniz","unuz","ünüz",
    "ları","leri",
    "daki","deki",
    "dan","den","tan","ten",
    "da","de","ta","te",
    "ı","i","u","ü",
    "yı","yi","yu","yü",
    "ın","in","un","ün",
    "sin","sın","sun","sün",
    "siniz","sınız","sunuz","sünüz",
    "iz","ız","uz","üz",
    "dik","dık","duk","dük","tik","tak","tuk","tük",
    "ecek","acak","ecek","acak",
    "iyor","ıyor","üyor","uyor",
    "di","dı","du","dü","ti","tı","tu","tü",
    "miş","mış","muş","müş",
    "mek","mak",
    "me","ma",
    "le","la",
    "ce","ca","çe","ça",
    "ken","kin","kun","kün",
    "li","lı","lu","lü",
    "siz","sız","suz","süz",
    "ci","cı","cu","cü","çi","çı","çu","çü",
    "sel","sal",
    "dir","dır","dur","dür","tir","tır","tur","tür",
    "di","dı","du","dü",
    "se","sa","yse","ysa",
  ];
  let stemmed = word;
  for (const suf of suffixes) {
    if (stemmed.length > suf.length + 2 && stemmed.endsWith(suf)) {
      stemmed = stemmed.slice(0, -suf.length);
      break;
    }
  }
  return stemmed;
}

function getSemanticVector(words) {
  const vec = {};
  words.forEach(w => {
    const stemmed = stemTr(w);
    vec[stemmed] = (vec[stemmed] || 0) + 1;
    const groupId = WORD_TO_GROUP[w];
    if (groupId !== undefined) {
      vec['syn_' + groupId] = (vec['syn_' + groupId] || 0) + 1;
    }
  });
  return vec;
}

function cosineSimilarity(vecA, vecB) {
  const allKeys = new Set([...Object.keys(vecA), ...Object.keys(vecB)]);
  let dot = 0, magA = 0, magB = 0;
  allKeys.forEach(k => {
    const a = vecA[k] || 0;
    const b = vecB[k] || 0;
    dot += a * b;
    magA += a * a;
    magB += b * b;
  });
  if (magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

// ===================== ANALİZ =====================
function analyze() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;

  const lang = detectLang(text);
  const sentences = getSentences(text);
  const allWords = getWords(text);
  const filteredWords = getWordsFiltered(text, lang);
  const clichesTR = lang === 'tr' ? TR_CLICHES : [];
  const clichesEN = lang === 'en' ? EN_CLICHES : [];
  const allCliches = [...clichesTR, ...clichesEN];
  const passiveList = lang === 'tr' ? PASSIVE_TR : [];

  // 1. Tipografik karakterler
  let typoCount = 0;
  TYPO_CHARS.forEach(re => { const m = text.match(re); if (m) typoCount += m.length; });

  // 2. Klişe ifadeler
  const foundCliches = [];
  const textLower = text.toLowerCase();
  allCliches.forEach(c => {
    const regex = new RegExp(c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    const matches = textLower.match(regex);
    if (matches) {
      matches.forEach(() => foundCliches.push(c));
    }
  });

  // 3. Pasif yapı
  let passiveCount = 0;
  passiveList.forEach(p => {
    const regex = new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    const m = text.match(regex);
    if (m) passiveCount += m.length;
  });
  if (lang === 'en') {
    const m = text.match(PASSIVE_EN);
    if (m) passiveCount += m.length;
  }

  // 4. Liste satırları
  const lines = text.split('\n');
  const listLines = lines.filter(l => /^\s*[-•]\s/.test(l)).length;

  // 5. Markdown başlıkları
  const headingLines = lines.filter(l => /^\s*#{1,6}\s/.test(l)).length;

  // 6. Cümle uzunlukları
  const sentLengths = sentences.map(s => getWords(s).length);

  // 7. TTR
  const uniqueWords = new Set(allWords);
  const ttr = allWords.length > 0 ? uniqueWords.size / allWords.length : 0;

  // 8. Burstiness
  const sd = stdDev(sentLengths);
  const avg = mean(sentLengths);
  const burstiness = avg > 0 ? sd / avg : 0;

  // 9. Jaccard cümle benzerliği (kelime örtüşmesi)
  const sentWordSets = sentences.map(s => new Set(getWordsFiltered(s, lang)));
  const similarPairsJaccard = [];
  for (let i = 0; i < sentWordSets.length; i++) {
    for (let j = i + 1; j < sentWordSets.length; j++) {
      const sim = jaccard(sentWordSets[i], sentWordSets[j]);
      if (sim >= 0.55) {
        similarPairsJaccard.push({ a: sentences[i], b: sentences[j], sim: sim, type: 'kelime' });
      }
    }
  }
  similarPairsJaccard.sort((a,b) => b.sim - a.sim);

  // 9b. Semantik benzerlik (aynı şeyi farklı kelimelerle anlatan cümleler)
  const semanticPairs = [];
  for (let i = 0; i < sentences.length; i++) {
    for (let j = i + 1; j < sentences.length; j++) {
      const wordsA = getWordsFiltered(sentences[i], lang);
      const wordsB = getWordsFiltered(sentences[j], lang);
      if (wordsA.length < 2 || wordsB.length < 2) continue;

      const vecA = getSemanticVector(wordsA);
      const vecB = getSemanticVector(wordsB);
      const cosSim = cosineSimilarity(vecA, vecB);

      const jacSim = jaccard(sentWordSets[i], sentWordSets[j]);

      if (cosSim >= 0.30 && jacSim < 0.55) {
        semanticPairs.push({
          a: sentences[i],
          b: sentences[j],
          cosSim: cosSim,
          jacSim: jacSim
        });
      }
    }
  }
  semanticPairs.sort((a,b) => b.cosSim - a.cosSim);

  // Tüm benzer çiftleri birleştir (skorlama için)
  const allSimilarPairs = [...similarPairsJaccard, ...semanticPairs];
  allSimilarPairs.sort((a,b) => (b.sim || b.cosSim) - (a.sim || a.cosSim));

  // 10. Trigram analizi
  const trigramCounts = {};
  for (let i = 0; i <= filteredWords.length - 3; i++) {
    const tri = filteredWords[i] + ' ' + filteredWords[i+1] + ' ' + filteredWords[i+2];
    trigramCounts[tri] = (trigramCounts[tri] || 0) + 1;
  }
  const repeatedTrigrams = Object.entries(trigramCounts)
    .filter(([,c]) => c > 1)
    .sort((a,b) => b[1] - a[1]);

  // ===================== SKORLAMA =====================
  let aiScore = 0;
  if (foundCliches.length >= 3) aiScore += 25;
  else if (foundCliches.length >= 1) aiScore += 12;
  if (typoCount >= 3) aiScore += 20;
  else if (typoCount >= 1) aiScore += 8;
  if (burstiness < 0.45) aiScore += 15;
  if (listLines > 3) aiScore += 10;
  if (headingLines > 2) aiScore += 10;
  if (passiveCount > 2) aiScore += 10;
  if (ttr > 0.70) aiScore += 10;
  aiScore = Math.min(aiScore, 100);

  let repeatScore = 0;
  repeatScore += Math.min(allSimilarPairs.length * 15, 40);
  const trigExtra = Math.max(0, repeatedTrigrams.length - 3);
  repeatScore += Math.min(trigExtra * 8, 30);
  repeatScore = Math.min(repeatScore, 100);

  const originalityScore = Math.max(0, 100 - aiScore - repeatScore * 0.3);

  // ===================== BULGULAR =====================
  const findings = [];
  if (foundCliches.length > 0) {
    findings.push({ text: `${foundCliches.length} adet klişe ifade tespit edildi`, badge: 'Klişe' });
  }
  if (typoCount > 0) {
    findings.push({ text: `${typoCount} adet tipografik karakter (em dash, akıllı tırnak vb.)`, badge: 'YZ İşareti' });
  }
  if (burstiness < 0.45) {
    findings.push({ text: `Düşük cümle varyansı (burstiness: ${burstiness.toFixed(2)}) — monoton akış`, badge: 'YZ İşareti' });
  }
  if (passiveCount > 0) {
    findings.push({ text: `${passiveCount} adet pasif yapı tespit edildi`, badge: 'YZ İşareti' });
  }
  if (listLines > 0) {
    findings.push({ text: `${listLines} adet liste satırı`, badge: 'YZ İşareti' });
  }
  if (headingLines > 0) {
    findings.push({ text: `${headingLines} adet markdown başlığı`, badge: 'YZ İşareti' });
  }
  if (similarPairsJaccard.length > 0) {
    findings.push({ text: `${similarPairsJaccard.length} adet benzer cümle çifti (aynı kelimeler, >%55)`, badge: 'Tekrar' });
  }
  if (semanticPairs.length > 0) {
    findings.push({ text: `${semanticPairs.length} adet anlamsal olarak benzer cümle (farklı kelimeler, aynı anlam)`, badge: 'Tekrar' });
  }
  if (repeatedTrigrams.length > 0) {
    findings.push({ text: `${repeatedTrigrams.length} adet tekrar eden trigram`, badge: 'Tekrar' });
  }
  if (findings.length === 0) {
    findings.push({ text: 'Önemli bir işaret tespit edilmedi', badge: 'Temiz' });
  }

  // ===================== ÖZET RAPOR =====================
  let summary = '';
  summary += `Metin ${allWords.length} kelime ve ${sentences.length} cümleden oluşmaktadır. `;
  summary += `Sözcük çeşitliliği (TTR) %${(ttr*100).toFixed(1)} olarak hesaplanmıştır. `;
  if (aiScore > 60) {
    summary += `Yapay Zeka skoru yüksek (${aiScore}/100) çıkmıştır. `;
    if (foundCliches.length > 0) summary += `${foundCliches.length} klişe ifade, `;
    if (burstiness < 0.45) summary += 'monoton cümle akışı, ';
    if (passiveCount > 2) summary += 'yoğun pasif yapı kullanımı, ';
    summary = summary.replace(/, $/,'');
    summary += '. Bu bulgular metnin yapay zeka tarafından üretilmiş olabileceğini düşündürmektedir. ';
  } else if (aiScore >= 30) {
    summary += `Yapay Zeka skoru orta seviyededir (${aiScore}/100). Bazı YZ işaretleri bulunmakla birlikte kesin bir yargı zordur. `;
  } else {
    summary += `Yapay Zeka skoru düşük (${aiScore}/100). Metin büyük olasılıkla insan tarafından yazılmıştır. `;
  }
  if (repeatScore > 40) {
    summary += `Tekrar skoru yüksektir (${repeatScore}/100). ${similarPairsJaccard.length} kelime bazlı tekrar, ${semanticPairs.length} anlamsal tekrar ve ${repeatedTrigrams.length} tekrar eden trigram tespit edilmiştir. `;
  }
  summary += `Orijinallik skoru ${originalityScore.toFixed(0)}/100 olarak hesaplanmıştır.`;

  // ===================== ARAYÜZE YAZDIRMA =====================
  renderMetrics(allWords.length, sentences.length, ttr, burstiness);
  renderScores(aiScore, repeatScore, originalityScore, foundCliches, typoCount, listLines, passiveCount, allSimilarPairs, repeatedTrigrams, burstiness);
  renderFindings(findings);
  renderRepeats(similarPairsJaccard, semanticPairs);
  renderExpressions(foundCliches, repeatedTrigrams);
  renderCharts(sentLengths, filteredWords);
  renderSummary(summary);

  document.getElementById('results').classList.add('visible');
}

function renderMetrics(wordCount, sentCount, ttr, burstiness) {
  document.getElementById('metricsRow').innerHTML = `
    <div class="card">
      <div class="card-title">Kelime Sayısı</div>
      <div class="metric-value">${wordCount}</div>
    </div>
    <div class="card">
      <div class="card-title">Cümle Sayısı</div>
      <div class="metric-value">${sentCount}</div>
    </div>
    <div class="card">
      <div class="card-title">Sözcük Çeşitliliği (TTR)</div>
      <div class="metric-value">${(ttr*100).toFixed(1)}%</div>
      <div class="metric-sub">${ttr > 0.65 ? 'Zengin' : ttr > 0.45 ? 'Orta' : 'Düşük'} kelime çeşitliliği</div>
    </div>
    <div class="card">
      <div class="card-title">Cümle Varyansı</div>
      <div class="metric-value">${burstiness.toFixed(2)}</div>
      <div class="metric-sub">${burstiness < 0.45 ? 'Monoton (YZ işareti)' : 'Çeşitli (İnsan işareti)'}</div>
    </div>
  `;
}

function renderScores(ai, repeat, originality, cliches, typos, lists, passives, pairs, trigrams, burst) {
  const aiColor = scoreColor(ai);
  const origColor = scoreColor(originality);

  // AI gauge items
  const clichPct = cliches.length >= 3 ? 100 : cliches.length >= 1 ? 50 : 0;
  const typoPct = typos >= 3 ? 100 : typos >= 1 ? 40 : 0;
  const listPct = lists > 3 ? 100 : lists > 0 ? 33 : 0;
  const passPct = passives > 2 ? 100 : passives > 0 ? 50 : 0;

  // Orig gauge items
  const simPct = pairs.length > 0 ? Math.min(pairs.length * 25, 100) : 0;
  const trigPct = trigrams.length > 3 ? Math.min((trigrams.length-3)*20, 100) : 0;
  const varPct = burst < 0.45 ? 80 : burst < 0.7 ? 40 : 10;

  document.getElementById('scoreRow').innerHTML = `
    <div class="card">
      <div class="card-title">Yapay Zeka Skoru</div>
      <div class="metric-value ${scoreClass(ai)}">${ai}</div>
      <div class="metric-sub">${ai > 60 ? 'Yüksek YZ olasılığı' : ai >= 30 ? 'Orta seviye' : 'Düşük olasılık'}</div>
      <div class="gauge-row">
        <div class="gauge-item">
          <span class="gauge-label">Klişeler</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${clichPct}%;background:var(--yellow)"></div></div>
          <span class="gauge-val">${cliches.length}</span>
        </div>
        <div class="gauge-item">
          <span class="gauge-label">Tipografik</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${typoPct}%;background:var(--accent)"></div></div>
          <span class="gauge-val">${typos}</span>
        </div>
        <div class="gauge-item">
          <span class="gauge-label">Liste</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${listPct}%;background:var(--green)"></div></div>
          <span class="gauge-val">${lists}</span>
        </div>
        <div class="gauge-item">
          <span class="gauge-label">Pasif Yapı</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${passPct}%;background:var(--red)"></div></div>
          <span class="gauge-val">${passives}</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Orijinallik Skoru</div>
      <div class="metric-value ${scoreClass(originality)}">${originality.toFixed(0)}</div>
      <div class="metric-sub">${originality > 60 ? 'Yüksek orijinallik' : originality >= 30 ? 'Orta seviye' : 'Düşük orijinallik'}</div>
      <div class="gauge-row">
        <div class="gauge-item">
          <span class="gauge-label">Benzer Cümle</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${simPct}%;background:var(--red)"></div></div>
          <span class="gauge-val">${pairs.length}</span>
        </div>
        <div class="gauge-item">
          <span class="gauge-label">Trigram</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${trigPct}%;background:var(--red)"></div></div>
          <span class="gauge-val">${trigrams.length}</span>
        </div>
        <div class="gauge-item">
          <span class="gauge-label">Varyans</span>
          <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${varPct}%;background:var(--accent)"></div></div>
          <span class="gauge-val">${burst.toFixed(2)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderFindings(findings) {
  document.getElementById('findings').innerHTML = findings.map(f => {
    const badgeClass = f.badge === 'YZ İşareti' ? 'badge-ai' : f.badge === 'Tekrar' ? 'badge-repeat' : 'badge-clean';
    return `<div class="finding-row">
      <span class="finding-text">${f.text}</span>
      <span class="badge ${badgeClass}">${f.badge}</span>
    </div>`;
  }).join('');
}

function renderRepeats(jaccardPairs, semanticPairs) {
  const card = document.getElementById('repeatCard');
  const totalPairs = jaccardPairs.length + semanticPairs.length;
  if (totalPairs === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  let html = '';

  // Jaccard tekrarları (aynı kelimeler)
  if (jaccardPairs.length > 0) {
    html += '<div style="margin-bottom:1rem"><strong style="font-size:0.85rem;color:var(--red)">🔴 Aynı Kelimelerle Tekrar (' + jaccardPairs.length + ' çift)</strong></div>';
    jaccardPairs.slice(0, 20).forEach((p, i) => {
      const pct = Math.round(p.sim * 100);
      html += `<div class="repeat-pair">
        <div class="repeat-pct" style="color:${scoreColor(pct)}">%${pct} Kelime Örtüşmesi — Çift #${i+1}</div>
        <div class="repeat-sent">"${p.a}"</div>
        <div class="repeat-sent">"${p.b}"</div>
      </div>`;
    });
  }

  // Semantik tekrarlar (farklı kelimeler, aynı anlam)
  if (semanticPairs.length > 0) {
    html += '<div style="margin-bottom:1rem;margin-top:1rem"><strong style="font-size:0.85rem;color:var(--yellow)">🟡 Farklı Kelimelerle Aynı Anlam (' + semanticPairs.length + ' çift)</strong></div>';
    semanticPairs.slice(0, 20).forEach((p, i) => {
      const pct = Math.round(p.cosSim * 100);
      html += `<div class="repeat-pair">
        <div class="repeat-pct" style="color:${scoreColor(pct)}">%${pct} Anlamsal Benzerlik — Çift #${i+1}</div>
        <div class="repeat-sent">"${p.a}"</div>
        <div class="repeat-sent">"${p.b}"</div>
      </div>`;
    });
  }

  document.getElementById('repeats').innerHTML = html;
}

function renderExpressions(cliches, trigrams) {
  const card = document.getElementById('expressionsCard');
  if (cliches.length === 0 && trigrams.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  let html = '';
  if (cliches.length > 0) {
    html += '<div style="margin-bottom:0.8rem"><strong style="font-size:0.85rem;color:var(--text-secondary)">Klişe İfadeler:</strong><div class="pill-container" style="margin-top:0.4rem">';
    const unique = [...new Set(cliches)];
    unique.forEach(c => { html += `<span class="pill pill-cliche">${c}</span>`; });
    html += '</div></div>';
  }
  if (trigrams.length > 0) {
    html += '<div><strong style="font-size:0.85rem;color:var(--text-secondary)">Tekrar Eden Trigramlar:</strong><div class="pill-container" style="margin-top:0.4rem">';
    trigrams.slice(0,20).forEach(([tri, count]) => {
      html += `<span class="pill pill-trigram">${tri} (${count}×)</span>`;
    });
    html += '</div></div>';
  }
  document.getElementById('expressions').innerHTML = html;
}

function renderCharts(sentLengths, filteredWords) {
  // Cümle uzunluk dağılımı
  const buckets = {'1-5':0,'6-10':0,'11-20':0,'21-35':0,'35+':0};
  sentLengths.forEach(l => {
    if (l <= 5) buckets['1-5']++;
    else if (l <= 10) buckets['6-10']++;
    else if (l <= 20) buckets['11-20']++;
    else if (l <= 35) buckets['21-35']++;
    else buckets['35+']++;
  });

  if (sentenceChartInstance) sentenceChartInstance.destroy();
  const ctx1 = document.getElementById('sentenceChart').getContext('2d');
  sentenceChartInstance = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: Object.keys(buckets),
      datasets: [{
        label: 'Cümle Sayısı',
        data: Object.values(buckets),
        backgroundColor: ['#639922','#8bc34a','#EF9F27','#f59e0b','#E24B4A'],
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });

  // Kelime frekansı
  const wordCounts = {};
  filteredWords.forEach(w => { wordCounts[w] = (wordCounts[w]||0) + 1; });
  const top12 = Object.entries(wordCounts).sort((a,b) => b[1]-a[1]).slice(0,12);

  if (wordChartInstance) wordChartInstance.destroy();
  const ctx2 = document.getElementById('wordChart').getContext('2d');
  wordChartInstance = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: top12.map(([w]) => w),
      datasets: [{
        label: 'Tekrar Sayısı',
        data: top12.map(([,c]) => c),
        backgroundColor: '#6366f1',
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });
}

function renderSummary(text) {
  document.getElementById('summary').textContent = text;
}
